<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Playground с инспектором и сравнением</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #282840;
            --text: #cdd6f4;
            --text-secondary: #a6adc8;
            --border: #45475a;
            --accent: #89b4fa;
            --accent-hover: #74c7ec;
            --highlight: rgba(137, 180, 250, 0.3);
            --highlight-compare: rgba(166, 227, 161, 0.3);
            --tab-active: #313150;
            --tab-inactive: #1e1e2e;
            --danger: #f38ba8;
            --success: #a6e3a1;
            --radius: 8px;
            --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #11111b;
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ===== Шапка с вкладками ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px 0 12px;
            background: #11111b;
            min-height: 44px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        .tabs-container {
            display: flex;
            gap: 2px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            align-items: flex-end;
            height: 100%;
            min-height: 38px;
        }
        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--tab-inactive);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.15s;
            position: relative;
            color: var(--text-secondary);
            min-width: 80px;
            height: 36px;
        }
        .tab:hover {
            background: #252540;
        }
        .tab.active {
            background: var(--tab-active);
            color: var(--text);
            border-color: var(--accent);
            border-bottom-color: var(--tab-active);
            z-index: 1;
        }
        .tab.compare-active {
            border-color: var(--success);
            background: rgba(166, 227, 161, 0.1);
        }
        .tab .tab-name {
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab .tab-close {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
            line-height: 1;
        }
        .tab .tab-close:hover {
            background: var(--danger);
            color: #fff;
        }
        .tab .compare-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
            display: none;
        }
        .tab.compare-active .compare-dot {
            display: block;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            height: 30px;
        }
        .btn:hover {
            background: var(--tab-active);
            border-color: var(--accent);
        }
        .btn.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #11111b;
            font-weight: 600;
        }
        .btn.accent:hover {
            background: var(--accent-hover);
        }
        .btn.compare {
            background: rgba(166, 227, 161, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
        .btn.compare:hover {
            background: rgba(166, 227, 161, 0.25);
        }
        .btn.compare.active {
            background: var(--success);
            color: #11111b;
            font-weight: 600;
        }
        .btn.open-window {
            background: #45475a;
            border-color: #585b70;
        }
        .btn.open-window:hover {
            background: #585b70;
            border-color: var(--accent);
        }

        .add-tab-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            cursor: pointer;
            font-size: 18px;
            border-radius: var(--radius) var(--radius) 0 0;
            border-bottom: none;
            height: 36px;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .add-tab-btn:hover {
            color: var(--text);
            border-color: var(--accent);
            background: #252540;
        }

        /* ===== Основная область ===== */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .panel-left {
            flex: 1;
            min-width: 250px;
            border-right: 2px solid var(--border);
            background: var(--bg);
        }
        .panel-compare {
            flex: 1;
            min-width: 250px;
            border-right: 2px solid rgba(166, 227, 161, 0.4);
            background: var(--bg);
            display: none;
        }
        .panel-compare.visible {
            display: flex;
        }
        .panel-right {
            flex: 1;
            min-width: 300px;
            background: #fff;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            flex-shrink: 0;
            min-height: 32px;
            gap: 8px;
        }
        .panel-compare .panel-header {
            border-bottom-color: rgba(166, 227, 161, 0.3);
            background: rgba(166, 227, 161, 0.05);
        }
        .panel-header .mode-indicator {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--tab-inactive);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .panel-header .mode-indicator.active {
            background: rgba(137, 180, 250, 0.25);
            color: var(--accent);
        }
        .panel-header .compare-label {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(166, 227, 161, 0.2);
            color: var(--success);
            white-space: nowrap;
        }

        /* ===== Редактор кода ===== */
        .code-editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }

        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 46px;
            background: #181825;
            border-right: 1px solid var(--border);
            color: var(--text-secondary);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 21.45px;
            padding: 12px 0;
            text-align: right;
            overflow: hidden;
            pointer-events: none;
            z-index: 2;
        }
        .line-numbers span {
            display: block;
            padding-right: 8px;
            height: 21.45px;
            line-height: 21.45px;
            transition: all 0.15s;
        }
        .line-numbers span.highlighted {
            background: var(--highlight);
            color: var(--accent);
            font-weight: bold;
        }
        .panel-compare .line-numbers span.highlighted {
            background: var(--highlight-compare);
            color: var(--success);
        }

        textarea.code-textarea {
            position: absolute;
            left: 46px;
            top: 0;
            right: 0;
            bottom: 0;
            width: calc(100% - 46px);
            background: transparent;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            line-height: 21.45px;
            padding: 12px 14px;
            border: none;
            outline: none;
            resize: none;
            tab-size: 2;
            white-space: pre;
            overflow: auto;
        }

        .highlight-overlay {
            position: absolute;
            left: 46px;
            right: 0;
            height: 21.45px;
            background: var(--highlight);
            pointer-events: none;
            z-index: 1;
            border-left: 3px solid var(--accent);
            display: none;
        }
        .panel-compare .highlight-overlay {
            background: var(--highlight-compare);
            border-left-color: var(--success);
        }

        /* ===== Панель предпросмотра ===== */
        .preview-container {
            flex: 1;
            position: relative;
            background: #fff;
        }
        .preview-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .preview-container.inspecting {
            cursor: crosshair;
        }

        /* Разделители */
        .resizer {
            width: 4px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.15s;
            z-index: 5;
        }
        .resizer:hover,
        .resizer.active {
            background: var(--accent);
        }
        .resizer-compare {
            background: rgba(166, 227, 161, 0.3);
        }
        .resizer-compare:hover,
        .resizer-compare.active {
            background: var(--success);
        }

        /* Панель инструментов предпросмотра */
        .preview-toolbar {
            display: flex;
            gap: 6px;
            padding: 6px 12px;
            background: #f0f0f0;
            border-bottom: 1px solid #ddd;
            flex-shrink: 0;
            align-items: center;
            flex-wrap: wrap;
            min-height: 38px;
        }
        .preview-toolbar .btn-preview {
            background: #fff;
            border: 1px solid #ccc;
            color: #333;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .preview-toolbar .btn-preview:hover {
            border-color: #888;
            background: #f5f5f5;
        }
        .preview-toolbar .btn-preview.active {
            background: #d0e4ff;
            border-color: #89b4fa;
            color: #1e40af;
            font-weight: 600;
        }
        .preview-url {
            font-size: 11px;
            color: #888;
            margin-left: auto;
            font-family: var(--mono);
            background: #fff;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
            flex-shrink: 1;
        }

        /* Подсказка инспектора */
        .inspector-tooltip {
            position: fixed;
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: var(--mono);
            pointer-events: none;
            z-index: 1000;
            border: 1px solid var(--accent);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            display: none;
            transition: opacity 0.1s;
        }

        /* Скроллбары */
        ::-webkit-scrollbar {
            width: 7px;
            height: 7px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6c7086;
        }

        @keyframes pulse-highlight {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(137, 180, 250, 0.4);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(137, 180, 250, 0);
            }
        }
        .pulse {
            animation: pulse-highlight 0.8s ease-out;
        }

        @media (max-width: 800px) {
            .main {
                flex-direction: column;
            }
            .panel-left,
            .panel-compare,
            .panel-right {
                min-width: 100%;
                max-height: 50vh;
            }
            .resizer {
                width: 100%;
                height: 4px;
                cursor: row-resize;
            }
        }
    </style>
</head>
<body>

    <div class="header" id="header">
        <div class="tabs-container" id="tabsContainer"></div>
        <button class="add-tab-btn" id="addTabBtn" title="Новая вкладка">+</button>
        <button class="btn compare" id="btnCompare" title="Режим сравнения: открыть второй код рядом">⇔ Сравнить</button>
        <button class="btn open-window" id="btnOpenWindow" title="Открыть результат в новом окне браузера">↗ В новом окне</button>
    </div>

    <div class="main" id="mainContainer">
        <div class="panel panel-left" id="panelLeft">
            <div class="panel-header">
                <span>📝 Код</span>
                <span class="mode-indicator" id="modeIndicator">Обычный режим</span>
            </div>
            <div class="code-editor-wrapper" id="codeEditorWrapper">
                <div class="line-numbers" id="lineNumbers"></div>
                <div class="highlight-overlay" id="highlightOverlay"></div>
                <textarea class="code-textarea" id="codeTextarea" spellcheck="false"
            placeholder="Введите HTML код здесь..."></textarea>
        </div>
    </div>

    <div class="resizer" id="resizer1"></div>

    <div class="panel panel-compare" id="panelCompare">
        <div class="panel-header">
            <span>📝 Код для сравнения</span>
            <span class="compare-label">Режим сравнения</span>
        </div>
        <div class="code-editor-wrapper" id="compareEditorWrapper">
            <div class="line-numbers" id="compareLineNumbers"></div>
            <div class="highlight-overlay" id="compareHighlightOverlay"></div>
            <textarea class="code-textarea" id="compareTextarea" spellcheck="false"
        placeholder="Выберите вкладку для сравнения..."></textarea>
    </div>
</div>

<div class="resizer resizer-compare" id="resizer2"></div>

<div class="panel panel-right" id="panelRight">
    <div class="preview-toolbar">
        <button class="btn-preview" id="btnRefresh" title="Обновить предпросмотр (Ctrl+S)">🔄 Обновить</button>
        <button class="btn-preview" id="btnInspect" title="Режим инспектора (Ctrl+I)">🔍 Инспектор</button>
        <button class="btn-preview" id="btnOpenWindow2" title="Открыть в новом окне">↗ В окне</button>
        <span class="preview-url" id="previewUrl">песочница</span>
    </div>
    <div class="preview-container" id="previewContainer">
        <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-popups-to-escape-sandbox" title="Предпросмотр"></iframe>
    </div>
    <div class="inspector-tooltip" id="inspectorTooltip"></div>
</div>
</div>

<script>
    (() => {
        // Константа высоты строки — должна совпадать с CSS (line-height)
        const LINE_HEIGHT = 21.45;

        const state = {
            tabs: [],
            activeTabId: null,
            compareTabId: null,
            isInspecting: false,
            highlightedLine: null,
            compareHighlightedLine: null,
            tabCounter: 1,
            isCompareMode: false,
            previewBlobUrl: null,
        };

        const tabsContainer = document.getElementById('tabsContainer');
        const addTabBtn = document.getElementById('addTabBtn');
        const codeTextarea = document.getElementById('codeTextarea');
        const lineNumbers = document.getElementById('lineNumbers');
        const highlightOverlay = document.getElementById('highlightOverlay');
        const compareTextarea = document.getElementById('compareTextarea');
        const compareLineNumbers = document.getElementById('compareLineNumbers');
        const compareHighlightOverlay = document.getElementById('compareHighlightOverlay');
        const panelCompare = document.getElementById('panelCompare');
        const previewFrame = document.getElementById('previewFrame');
        const previewContainer = document.getElementById('previewContainer');
        const btnRefresh = document.getElementById('btnRefresh');
        const btnInspect = document.getElementById('btnInspect');
        const btnCompare = document.getElementById('btnCompare');
        const btnOpenWindow = document.getElementById('btnOpenWindow');
        const btnOpenWindow2 = document.getElementById('btnOpenWindow2');
        const modeIndicator = document.getElementById('modeIndicator');
        const inspectorTooltip = document.getElementById('inspectorTooltip');
        const resizer1 = document.getElementById('resizer1');
        const resizer2 = document.getElementById('resizer2');
        const panelLeft = document.getElementById('panelLeft');
        const panelRight = document.getElementById('panelRight');

        function getDemoCode() {
            return `<!DOCTYPE html>
        <html lang="ru">
        <head>
        <meta charset="UTF-8">
        <style>
        body {
        font-family: system-ui, sans-serif;
        max-width: 560px;
        margin: 30px auto;
        padding: 20px;
        background: #f8f9fa;
        }
        .card {
        background: white;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.07);
        margin-bottom: 16px;
        border: 1px solid #e5e7eb;
        }
        .card h2 { margin: 0 0 6px 0; color: #1f2937; font-size: 20px; }
        .card p { color: #6b7280; line-height: 1.65; margin: 0 0 12px 0; }
        .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        background: #ede9fe;
        color: #7c3aed;
        margin-right: 6px;
        }
        button {
        background: #7c3aed;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
        }
        button:hover { background: #6d28d9; }
        </style>
        </head>
        <body>
        <div class="card">
        <span class="badge">Новое</span>
        <span class="badge">2026</span>
        <h2>Заголовок карточки</h2>
        <p>Кликните на элемент в режиме инспектора — строка подсветится ровно.</p>
        <button>Нажми меня</button>
        </div>
        <div class="card">
        <h2>Вторая карточка</h2>
        <p>Другой контент для тестирования.</p>
        </div>
        </body>
        </html>`;
        }

        function getDemoCode2() {
            return `<!DOCTYPE html>
        <html lang="ru">
        <head>
        <meta charset="UTF-8">
        <style>
        body {
        font-family: system-ui, sans-serif;
        max-width: 560px;
        margin: 30px auto;
        padding: 20px;
        background: #1f2937;
        color: #f9fafb;
        }
        .card {
        background: #374151;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        margin-bottom: 16px;
        border: 1px solid #4b5563;
        }
        .card h2 { margin: 0 0 6px 0; color: #f9fafb; font-size: 20px; }
        .card p { color: #d1d5db; line-height: 1.65; margin: 0 0 12px 0; }
        .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        background: #065f46;
        color: #6ee7b7;
        margin-right: 6px;
        }
        button {
        background: #10b981;
        color: #064e3b;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.2s;
        }
        button:hover { background: #34d399; }
        </style>
        </head>
        <body>
        <div class="card">
        <span class="badge">Тёмная тема</span>
        <span class="badge">v2</span>
        <h2>Та же структура, другой стиль</h2>
        <p>Сравните этот вариант с оригиналом.</p>
        <button>Нажми меня</button>
        </div>
        </body>
        </html>`;
        }

        function init() {
            const tab1 = createTab('Пример 1 (светлый)', getDemoCode());
            const tab2 = createTab('Пример 2 (тёмный)', getDemoCode2());
            state.tabs.push(tab1, tab2);
            state.activeTabId = tab1.id;
            state.tabCounter = 2;
            renderTabs();
            switchToTab(tab1.id);

            addTabBtn.addEventListener('click', addNewTab);
            codeTextarea.addEventListener('input', () => onCodeInput(codeTextarea, 'active'));
            codeTextarea.addEventListener('scroll', () => syncScroll(codeTextarea, lineNumbers, highlightOverlay,
                'highlightedLine'));
            compareTextarea.addEventListener('input', () => onCodeInput(compareTextarea, 'compare'));
            compareTextarea.addEventListener('scroll', () => syncScroll(compareTextarea, compareLineNumbers,
                compareHighlightOverlay, 'compareHighlightedLine'));
            btnRefresh.addEventListener('click', () => updatePreview());
            btnInspect.addEventListener('click', toggleInspectMode);
            btnCompare.addEventListener('click', toggleCompareMode);
            // Обе кнопки открывают в новом окне
            btnOpenWindow.addEventListener('click', openInNewWindow);
            btnOpenWindow2.addEventListener('click', openInNewWindow);
            setupResizer(resizer1, panelLeft, panelCompare, 'left');
            setupResizer(resizer2, panelCompare, panelRight, 'compare');

            updateLineNumbers(codeTextarea, lineNumbers, 'highlightedLine');
            updatePreview();

            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    updatePreview();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
                    e.preventDefault();
                    toggleInspectMode();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                    e.preventDefault();
                    toggleCompareMode();
                }
                if (e.key === 'Escape' && state.isInspecting) {
                    toggleInspectMode();
                }
            });
        }

        function createTab(name, code = '') {
            return {
                id: 'tab_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                name: name || 'Вкладка ' + state.tabCounter,
                code: code,
            };
        }

        function addNewTab() {
            state.tabCounter++;
            const tab = createTab('Вкладка ' + state.tabCounter);
            state.tabs.push(tab);
            state.activeTabId = tab.id;
            renderTabs();
            switchToTab(tab.id);
        }

        function closeTab(tabId) {
            if (state.tabs.length <= 1) return;
            const idx = state.tabs.findIndex(t => t.id === tabId);
            if (idx === -1) return;
            state.tabs.splice(idx, 1);
            if (state.compareTabId === tabId) {
                state.compareTabId = null;
                if (state.isCompareMode) toggleCompareMode();
            }
            if (state.activeTabId === tabId) {
                const newIdx = Math.min(idx, state.tabs.length - 1);
                state.activeTabId = state.tabs[newIdx].id;
                switchToTab(state.activeTabId);
            }
            renderTabs();
        }

        function switchToTab(tabId) {
            const tab = state.tabs.find(t => t.id === tabId);
            if (!tab) return;
            saveCurrentTabCode();
            state.activeTabId = tabId;
            codeTextarea.value = tab.code;
            state.highlightedLine = null;
            highlightOverlay.style.display = 'none';
            updateLineNumbers(codeTextarea, lineNumbers, 'highlightedLine');
            updatePreview();
            renderTabs();
            codeTextarea.focus();
            if (state.isCompareMode && state.compareTabId) {
                const compTab = state.tabs.find(t => t.id === state.compareTabId);
                if (compTab) {
                    compareTextarea.value = compTab.code;
                    state.compareHighlightedLine = null;
                    compareHighlightOverlay.style.display = 'none';
                    updateLineNumbers(compareTextarea, compareLineNumbers, 'compareHighlightedLine');
                }
            }
        }

        function saveCurrentTabCode() {
            const tab = state.tabs.find(t => t.id === state.activeTabId);
            if (tab) tab.code = codeTextarea.value;
            if (state.compareTabId) {
                const compTab = state.tabs.find(t => t.id === state.compareTabId);
                if (compTab) compTab.code = compareTextarea.value;
            }
        }

        function onCodeInput(textarea, type) {
            if (type === 'active') {
                const tab = state.tabs.find(t => t.id === state.activeTabId);
                if (tab) tab.code = textarea.value;
                updateLineNumbers(codeTextarea, lineNumbers, 'highlightedLine');
                clearTimeout(window._previewTimeout);
                window._previewTimeout = setTimeout(updatePreview, 400);
            } else if (type === 'compare' && state.compareTabId) {
                const tab = state.tabs.find(t => t.id === state.compareTabId);
                if (tab) tab.code = textarea.value;
                updateLineNumbers(compareTextarea, compareLineNumbers, 'compareHighlightedLine');
            }
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            state.tabs.forEach(tab => {
                const isActive = tab.id === state.activeTabId;
                const isCompare = tab.id === state.compareTabId;
                const el = document.createElement('div');
                let cls = 'tab';
                if (isActive) cls += ' active';
                if (isCompare) cls += ' compare-active';
                el.className = cls;
                el.innerHTML = `
                    <span class="compare-dot"></span>
                    <span class="tab-name" title="${escapeHtml(tab.name)}">${escapeHtml(tab.name)}</span>
                    <button class="tab-close" data-close="${tab.id}">&times;</button>
                `;
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.tab-close')) return;
                    if (e.shiftKey || e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        setCompareTab(tab.id);
                    } else {
                        switchToTab(tab.id);
                    }
                });
                el.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const menu = document.createElement('div');
                    menu.style.cssText = `
                        position: fixed; left: ${e.clientX}px; top: ${e.clientY}px;
                        background: #313150; border: 1px solid #45475a; border-radius: 8px;
                        padding: 6px 0; z-index: 9999; min-width: 160px;
                        box-shadow: 0 8px 24px rgba(0,0,0,0.5); font-size: 13px;
                    `;
                    menu.innerHTML = `
                        <div style="padding: 8px 16px; cursor: pointer;" id="menu-compare">⇔ Сравнить с этим</div>
                        <div style="padding: 8px 16px; cursor: pointer;" id="menu-rename">✏ Переименовать</div>
                    `;
                    document.body.appendChild(menu);
                    menu.querySelector('#menu-compare').addEventListener('click', () => { setCompareTab(tab
                            .id);
                        menu.remove(); });
                    menu.querySelector('#menu-rename').addEventListener('click', () => {
                        const newName = prompt('Новое имя:', tab.name);
                        if (newName && newName.trim()) { tab.name = newName.trim();
                            renderTabs(); }
                        menu.remove();
                    });
                    const closeMenu = (ev) => { if (!menu.contains(ev.target)) { menu.remove();
                            document.removeEventListener('click', closeMenu); } };
                    setTimeout(() => document.addEventListener('click', closeMenu), 10);
                });
                el.querySelector('.tab-close').addEventListener('click', (e) => { e.stopPropagation();
                    closeTab(tab.id); });
                el.addEventListener('dblclick', (e) => {
                    if (e.target.closest('.tab-close')) return;
                    const newName = prompt('Новое имя:', tab.name);
                    if (newName && newName.trim()) { tab.name = newName.trim();
                        renderTabs(); }
                });
                tabsContainer.appendChild(el);
            });
        }

        function setCompareTab(tabId) {
            if (tabId === state.activeTabId) {
                alert('Нельзя сравнивать вкладку саму с собой.');
                return;
            }
            state.compareTabId = tabId;
            const tab = state.tabs.find(t => t.id === tabId);
            if (tab) {
                compareTextarea.value = tab.code;
                state.compareHighlightedLine = null;
                compareHighlightOverlay.style.display = 'none';
                updateLineNumbers(compareTextarea, compareLineNumbers, 'compareHighlightedLine');
            }
            if (!state.isCompareMode) toggleCompareMode();
            renderTabs();
        }

        function toggleCompareMode() {
            state.isCompareMode = !state.isCompareMode;
            if (state.isCompareMode) {
                if (!state.compareTabId) {
                    const otherTab = state.tabs.find(t => t.id !== state.activeTabId);
                    if (otherTab) {
                        state.compareTabId = otherTab.id;
                        compareTextarea.value = otherTab.code;
                        updateLineNumbers(compareTextarea, compareLineNumbers, 'compareHighlightedLine');
                    } else {
                        state.isCompareMode = false;
                        alert('Нужно минимум 2 вкладки.');
                        return;
                    }
                }
                panelCompare.classList.add('visible');
                btnCompare.classList.add('active');
                btnCompare.textContent = '⇔ Сравнение: Вкл';
                document.getElementById('mainContainer').classList.add('compare-mode');
                panelLeft.style.flex = '1';
                panelLeft.style.width = '';
                panelCompare.style.flex = '1';
                panelCompare.style.width = '';
                panelRight.style.flex = '1';
                panelRight.style.width = '';
            } else {
                panelCompare.classList.remove('visible');
                btnCompare.classList.remove('active');
                btnCompare.textContent = '⇔ Сравнить';
                document.getElementById('mainContainer').classList.remove('compare-mode');
                state.compareHighlightedLine = null;
                compareHighlightOverlay.style.display = 'none';
                updateLineNumbers(compareTextarea, compareLineNumbers, 'compareHighlightedLine');
                panelLeft.style.flex = '1';
                panelLeft.style.width = '';
                panelRight.style.flex = '1';
                panelRight.style.width = '';
            }
            renderTabs();
        }

        // ==================== НУМЕРАЦИЯ СТРОК И ПОДСВЕТКА (ИСПРАВЛЕНО) ====================
        function updateLineNumbers(textarea, numbersEl, highlightKey) {
            const lines = textarea.value.split('\n');
            const count = Math.max(lines.length, 1);
            const hl = state[highlightKey];
            let html = '';
            for (let i = 0; i < count; i++) {
                const cls = (hl === i) ? ' highlighted' : '';
                html += `<span class="${cls}">${i + 1}</span>`;
            }
            numbersEl.innerHTML = html;
            updateHighlightPosition(textarea, highlightKey);
        }

        function updateHighlightPosition(textarea, highlightKey) {
            const hl = state[highlightKey];
            const overlay = (highlightKey === 'highlightedLine') ? highlightOverlay : compareHighlightOverlay;
            if (hl !== null && hl >= 0) {
                const lineHeight = LINE_HEIGHT;
                const scrollTop = textarea.scrollTop;
                // Позиция строки с учётом padding-top (12px) и её номера
                const top = 12 + hl * lineHeight - scrollTop;
                overlay.style.display = 'block';
                overlay.style.top = top + 'px';
            } else {
                overlay.style.display = 'none';
            }
        }

        function syncScroll(textarea, numbersEl, overlay, highlightKey) {
            numbersEl.scrollTop = textarea.scrollTop;
            updateHighlightPosition(textarea, highlightKey);
        }

        function highlightLine(lineIndex, isCompare = false) {
            if (isCompare) {
                state.compareHighlightedLine = lineIndex;
                updateLineNumbers(compareTextarea, compareLineNumbers, 'compareHighlightedLine');
                scrollToLine(compareTextarea, lineIndex);
            } else {
                state.highlightedLine = lineIndex;
                updateLineNumbers(codeTextarea, lineNumbers, 'highlightedLine');
                scrollToLine(codeTextarea, lineIndex);
            }
        }

        function scrollToLine(textarea, lineIndex) {
            const targetY = 12 + lineIndex * LINE_HEIGHT;
            const visibleStart = textarea.scrollTop;
            const visibleEnd = visibleStart + textarea.clientHeight;
            if (targetY < visibleStart + LINE_HEIGHT || targetY > visibleEnd - LINE_HEIGHT * 2) {
                textarea.scrollTop = targetY - textarea.clientHeight / 3;
            }
        }

        // ==================== ПРЕДПРОСМОТР ====================
        function updatePreview() {
            saveCurrentTabCode();
            const code = codeTextarea.value;
            const processedCode = injectSourceMapping(code);
            const blob = new Blob([processedCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            if (state.previewBlobUrl) URL.revokeObjectURL(state.previewBlobUrl);
            state.previewBlobUrl = url;
            previewFrame.src = url;
            previewFrame._blobUrl = url;
            document.getElementById('previewUrl').textContent = 'песочница • обновлено';
            setTimeout(() => { document.getElementById('previewUrl').textContent = 'песочница'; }, 1500);
            if (state.isInspecting) {
                setTimeout(() => sendToFrame({ type: 'inspector-mode', enabled: true }), 300);
            }
        }

        function injectSourceMapping(htmlCode) {
            const lines = htmlCode.split('\n');
            const resultLines = [];
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                line = line.replace(/<(\w+)(\s[^>]*?)?(?<!\/)>/g, (match, tagName, attrs) => {
                    if (match.includes('data-source-line=')) return match;
                    if (match.startsWith('</')) return match;
                    const attrsStr = attrs || '';
                    return `<${tagName} data-source-line="${i + 1}"${attrsStr}>`;
                });
                resultLines.push(line);
            }
            const result = resultLines.join('\n');
            const inspectorScript = `
        <script>
        (function() {
        if (window.__inspectorInstalled) return;
        window.__inspectorInstalled = true;
        window.addEventListener('message', function(event) {
        if (!event.data || event.data.type !== 'inspector-mode') return;
        if (event.data.enabled) {
        document.body.style.cursor = 'crosshair';
        document.addEventListener('click', inspectorClickHandler, true);
        document.addEventListener('mouseover', inspectorHoverHandler, true);
        document.addEventListener('mouseout', inspectorOutHandler, true);
        } else {
        document.body.style.cursor = '';
        document.removeEventListener('click', inspectorClickHandler, true);
        document.removeEventListener('mouseover', inspectorHoverHandler, true);
        document.removeEventListener('mouseout', inspectorOutHandler, true);
        }
        });
        function findSourceLine(element) {
        let el = element;
        while (el && el !== document.body && el !== document.documentElement) {
        if (el.hasAttribute && el.hasAttribute('data-source-line')) {
        return parseInt(el.getAttribute('data-source-line')) - 1;
        }
        el = el.parentElement;
        }
        return null;
        }
        function inspectorClickHandler(e) {
        e.preventDefault();
        e.stopPropagation();
        const line = findSourceLine(e.target);
        if (line !== null) {
        window.parent.postMessage({
        type: 'element-clicked',
        line: line,
        tag: e.target.tagName.toLowerCase(),
        id: e.target.id || '',
        classes: Array.from(e.target.classList).join(' '),
        }, '*');
        }
        }
        function inspectorHoverHandler(e) {
        e.stopPropagation();
        const line = findSourceLine(e.target);
        if (line !== null) {
        const rect = e.target.getBoundingClientRect();
        window.parent.postMessage({
        type: 'element-hovered',
        line: line,
        tag: e.target.tagName.toLowerCase(),
        id: e.target.id || '',
        classes: Array.from(e.target.classList).join(' '),
        rect: { top: rect.top, left: rect.left, width: rect.width, height: rect.height },
        }, '*');
        } else {
        window.parent.postMessage({ type: 'element-unhovered' }, '*');
        }
        }
        function inspectorOutHandler(e) {
        setTimeout(() => {
        if (!document.querySelector(':hover')) {
        window.parent.postMessage({ type: 'element-unhovered' }, '*');
        }
        }, 50);
        }
        })();
        <\/script>`;
            if (result.includes('</body>')) {
                return result.replace('</body>', inspectorScript + '\n</body>');
            } else {
                return result + '\n' + inspectorScript;
            }
        }

        function toggleInspectMode() {
            state.isInspecting = !state.isInspecting;
            if (state.isInspecting) {
                btnInspect.classList.add('active');
                previewContainer.classList.add('inspecting');
                modeIndicator.textContent = '🔍 Инспектор';
                modeIndicator.classList.add('active');
                sendToFrame({ type: 'inspector-mode', enabled: true });
            } else {
                btnInspect.classList.remove('active');
                previewContainer.classList.remove('inspecting');
                modeIndicator.textContent = 'Обычный режим';
                modeIndicator.classList.remove('active');
                state.highlightedLine = null;
                highlightOverlay.style.display = 'none';
                updateLineNumbers(codeTextarea, lineNumbers, 'highlightedLine');
                sendToFrame({ type: 'inspector-mode', enabled: false });
                inspectorTooltip.style.display = 'none';
            }
        }

        function sendToFrame(data) {
            if (previewFrame.contentWindow) {
                previewFrame.contentWindow.postMessage(data, '*');
            }
        }

        window.addEventListener('message', (event) => {
            if (!state.isInspecting) return;
            const data = event.data;
            if (!data || !data.type) return;
            if (data.type === 'element-clicked') {
                highlightLine(data.line, false);
                btnInspect.classList.add('pulse');
                setTimeout(() => btnInspect.classList.remove('pulse'), 800);
            }
            if (data.type === 'element-hovered') {
                const tagInfo = data.tag + (data.id ? '#' + data.id : '') +
                    (data.classes ? '.' + data.classes.replace(/\s+/g, '.') : '');
                inspectorTooltip.textContent = `<${tagInfo}> → строка ${data.line + 1}`;
                inspectorTooltip.style.display = 'block';
                const iframeRect = previewFrame.getBoundingClientRect();
                const tooltipX = iframeRect.left + data.rect.left;
                const tooltipY = iframeRect.top + data.rect.top - 30;
                inspectorTooltip.style.left = Math.max(5, tooltipX) + 'px';
                inspectorTooltip.style.top = Math.max(5, tooltipY) + 'px';
                highlightLine(data.line, false);
            }
            if (data.type === 'element-unhovered') {
                inspectorTooltip.style.display = 'none';
                state.highlightedLine = null;
                highlightOverlay.style.display = 'none';
                updateLineNumbers(codeTextarea, lineNumbers, 'highlightedLine');
            }
        });

        // ==================== ОТКРЫТЬ В НОВОМ ОКНЕ (ИСПРАВЛЕНО) ====================
        function openInNewWindow() {
            saveCurrentTabCode();
            const code = codeTextarea.value;

            // Берём исходный код пользователя БЕЗ инжектирования data-source-line и скрипта инспектора
            // Чтобы окно открылось с чистым пользовательским HTML
            const blob = new Blob([code], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);

            // Открываем в новом окне
            const newWindow = window.open(url, '_blank', 'width=1024,height=768,scrollbars=yes,resizable=yes');

            if (newWindow) {
                // Освобождаем URL после загрузки
                newWindow.addEventListener('beforeunload', () => {
                    URL.revokeObjectURL(url);
                });
                // На случай если окно не закроется долго — очищаем через 30 секунд
                setTimeout(() => {
                    try { URL.revokeObjectURL(url); } catch (e) { /* уже очищен */ }
                }, 30000);
            } else {
                // Если всплывающее окно заблокировано, пробуем открыть в текущей вкладке
                const fallback = confirm(
                    'Браузер заблокировал всплывающее окно.\n\nНажмите "ОК" чтобы открыть результат в новой вкладке.'
                );
                if (fallback) {
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.rel = 'noopener';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 30000);
                }
            }
        }

        // ==================== РАЗДЕЛИТЕЛИ ====================
        function setupResizer(resizerEl, leftPanel, rightPanel, side) {
            let isResizing = false;
            let startX, startLeftWidth, startRightWidth;
            resizerEl.addEventListener('mousedown', (e) => {
                isResizing = true;
                resizerEl.classList.add('active');
                startX = e.clientX;
                startLeftWidth = leftPanel.getBoundingClientRect().width;
                startRightWidth = rightPanel.getBoundingClientRect().width;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });
            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;
                const delta = e.clientX - startX;
                const totalWidth = leftPanel.parentElement.getBoundingClientRect().width;
                const newLeftWidth = startLeftWidth + delta;
                const newRightWidth = startRightWidth - delta;
                const leftPercent = (newLeftWidth / totalWidth) * 100;
                const rightPercent = (newRightWidth / totalWidth) * 100;
                if (leftPercent > 15 && rightPercent > 15) {
                    leftPanel.style.flex = 'none';
                    leftPanel.style.width = leftPercent + '%';
                    rightPanel.style.flex = 'none';
                    rightPanel.style.width = rightPercent + '%';
                }
            });
            document.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    resizerEl.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        init();

        console.log('🚀 HTML Playground v3 готов!');
        console.log('  ✅ Подсветка строк исправлена — строка и номер совпадают');
        console.log('  ✅ "Открыть в новом окне" — работает через Blob URL');
        console.log('  📝 Ctrl+S — обновить предпросмотр');
        console.log('  🔍 Ctrl+I — режим инспектора');
        console.log('  ⇔ Ctrl+B — режим сравнения');
        console.log('  Esc — выйти из инспектора');
    })();
</script>
